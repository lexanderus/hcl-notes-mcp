    mode: LOCAL
    server: eumail/iba
    username: ${NOTES_USERNAME:}
    password: ${NOTES_PASSWORD:}
    pool-size: 5
    timeout-ms: 30000
  tools:
    delete-enabled: true

logging:
  file:
    name: D:/Alex/Claude/hcl-notes-mcp/hcl-notes-mcp.log
