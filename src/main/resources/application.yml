notes:
  connection:
    mode: LOCAL
    password: ${NOTES_PASSWORD:}
    timeout-ms: 30000
    # Optional: local mail replica path (relative to Notes Data dir).
    # Bypasses mail server — use when Notes.exe router is not running.
    # Set via env: NOTES_MAIL_LOCAL_DB=mail/ashevele.nsf
    mail-local-db: ${NOTES_MAIL_LOCAL_DB:}
  tools:
    delete-enabled: true

logging:
  file:
    name: logs/mcp-server.log
  level:
    root: INFO
    com.hcl.notes.mcp: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

spring:
  main:
    banner-mode: "off"
  ai:
    mcp:
      server:
        name: hcl-notes-mcp
        version: 1.1.0
        type: SYNC
