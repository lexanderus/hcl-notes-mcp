notes:
  connection:
    mode: LOCAL
    password: ${NOTES_PASSWORD:}
    timeout-ms: 30000
    # Optional: local mail replica path (relative to Notes Data dir).
    # Bypasses mail server — use when Notes.exe router is not running.
    # Default: local replica; override via env NOTES_MAIL_LOCAL_DB or JVM -Dnotes.mail.local.db
    mail-local-db: ${NOTES_MAIL_LOCAL_DB:mail/ashevele.nsf}
  tools:
    delete-enabled: true

spring:
  main:
    banner-mode: "off"
  ai:
    mcp:
      server:
        name: hcl-notes-mcp
        version: 1.1.0
        type: SYNC
