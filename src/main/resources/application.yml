notes:
  connection:
    mode: LOCAL
    password: ${NOTES_PASSWORD:}
    pool-size: 5
    timeout-ms: 30000
  tools:
    delete-enabled: true

logging:
  file:
    name: logs/mcp-server.log
  level:
    root: INFO
    com.hcl.notes.mcp: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

spring:
  main:
    banner-mode: "off"
  ai:
    mcp:
      server:
        name: hcl-notes-mcp
        version: 1.1.0
        type: SYNC
